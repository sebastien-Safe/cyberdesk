<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:;">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paiement annulé — CyberDesk</title>
<meta name="robots" content="noindex,nofollow">
<style>
:root{
  --navy:#f6f6f6;--panel:#ffffff;--line:#dddddd;
  --txt:#1d1d1b;--mut:#666666;--warn:#b34000;
  --ff-disp:'Sora',sans-serif;--ff-body:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:var(--ff-body),Arial,sans-serif;background:var(--navy);color:var(--txt)}
body{display:flex;align-items:center;justify-content:center;padding:20px}
.card{
  max-width:440px;width:100%;background:var(--panel);border:1px solid var(--line);
  border-radius:18px;padding:40px 32px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06);
}
.icon{font-size:3rem;margin-bottom:14px}
h1{font-family:var(--ff-disp);font-size:1.3rem;color:var(--warn);margin-bottom:10px;letter-spacing:-.02em}
p{font-size:.92rem;color:var(--mut);line-height:1.6;margin-bottom:8px}
.brand{margin-top:28px;font-size:.72rem;color:var(--mut);letter-spacing:.05em}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">↩️</div>
    <h1>Paiement annulé</h1>
    <p>Le paiement n'a pas été finalisé — aucun montant n'a été débité.</p>
    <p>Le devis reste valable : vous pouvez réessayer via le lien reçu par e-mail, ou nous contacter directement.</p>
    <div class="brand">S@FE — Prestataire référencé cybermalveillance.gouv.fr / 17Cyber</div>
  </div>
</body>
</html>
