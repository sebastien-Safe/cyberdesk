<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:;">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Réserver un créneau — CyberDesk</title>
<meta name="robots" content="noindex,nofollow">
<style>
:root{
  --navy:#f6f6f6;--panel:#ffffff;--line:#dddddd;
  --txt:#1d1d1b;--mut:#666666;--accent:#000091;--ok:#18753c;--warn:#b34000;--alert:#e1000f;
  --ff-disp:'Sora',sans-serif;--ff-body:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:var(--ff-body),Arial,sans-serif;background:var(--navy);color:var(--txt)}
body{display:flex;justify-content:center;padding:24px 16px}
.card{max-width:520px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.brand{font-family:var(--ff-disp);font-weight:800;font-size:1.05rem;margin-bottom:2px}
.brand b{color:var(--alert)}
.subtitle{font-size:.72rem;color:var(--mut);margin-bottom:20px}
h1{font-family:var(--ff-disp);font-size:1.15rem;margin-bottom:6px;letter-spacing:-.02em}
.hint{font-size:.85rem;color:var(--mut);margin-bottom:24px;line-height:1.5}
#gcal-booking-btn{display:flex;justify-content:center}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">S<b>@</b>FE</div>
    <div class="subtitle">Prestataire référencé cybermalveillance.gouv.fr / 17Cyber</div>
    <h1>Réserver un créneau d'intervention</h1>
    <p class="hint">Choisissez un créneau disponible dans notre agenda ci-dessous. Vous recevrez une confirmation immédiate par e-mail.</p>
    <div id="gcal-booking-btn"></div>
  </div>

<!-- Google Calendar Appointment Scheduling begin -->
<link href="https://calendar.google.com/calendar/scheduling-button-script.css" rel="stylesheet">
<script src="https://calendar.google.com/calendar/scheduling-button-script.js" async></script>
<script>
(function() {
  window.addEventListener('load', function() {
    calendar.schedulingButton.load({
      url: 'https://calendar.google.com/calendar/appointments/schedules/AcZssZ1LpG9E-ewaL7K8UFwHCuPzzsUYkePPP5WiNRzOV4qe9B9jSFvb5JT6oZLIUOWi7PsbaJrhRjsc?gv=true',
      color: '#000091',
      label: 'Réserver un rendez-vous',
      target: document.getElementById('gcal-booking-btn'),
    });
  });
})();
</script>
<!-- end Google Calendar Appointment Scheduling -->
</body>
</html>
